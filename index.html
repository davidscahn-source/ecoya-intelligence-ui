<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECOYA Intelligence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050a14; color: #e2e8f0; font-family: 'DM Mono', 'Courier New', monospace; min-height: 100vh; }
  
  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: #0a1628; border-bottom: 1px solid #00c9a722; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 28px; height: 28px; background: linear-gradient(135deg, #00c9a7, #0066ff); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: white; }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 0.12em; color: #00c9a7; }
  .logo-sub { font-size: 10px; color: #64748b; letter-spacing: 0.15em; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #00c9a7; letter-spacing: 0.1em; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #00c9a7; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .time-display { font-size: 12px; color: #64748b; font-family: 'DM Mono', monospace; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">

</head>
